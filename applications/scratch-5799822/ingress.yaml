apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: 
  namespace: scratch

spec:
  ingressClassName: traefik

  rules:
  - host: .lab.local

    http:
      paths:
      - path: /

        pathType: Prefix

        backend:
          service:
            name: 

            port:
              number: 80